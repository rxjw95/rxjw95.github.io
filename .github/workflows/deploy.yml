name: Gatsby Publish

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: git config --global user.email "rxjw95@gmail.com"
      - run: git config --global user.name "woogie"

      - uses: actions/setup-node@v2
        with:
          node-version: 20.3.1

      - name: npm install
        run: npm install --legacy-peer-deps

      - name: deploy
        run: npm run deploy-gh

